spring:
  application:
    name: Backend

  datasource:
    url: jdbc:postgresql://localhost:5432/signalroom
    username: postgres
    password: "@Postgre7498"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

server:
  port: 8080